backend:
  name: git-gateway
  branch: main # Branch to update (optional; defaults to master)

media_folder: "public/uploads" # Media files will be stored in the repo under public/uploads
public_folder: "/uploads" # The src attribute for uploaded media will begin with /uploads

collections:
  - name: "blog" # Used in routes, e.g., /admin/collections/blog
    label: "Blog Posts" # Used in the UI
    folder: "src/content/blog" # The path to the folder where the documents are stored
    create: true # Allow users to create new documents in this collection
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}" # Filename template, e.g., YYYY-MM-DD-title.md
    fields: # The fields for each document, usually in front matter
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Publish Date", name: "date", widget: "string" }
      - { label: "Category", name: "category", widget: "string" }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "settings"
    label: "Site Settings"
    delete: false
    editor:
      preview: false
    files:
      - name: "general"
        label: "General Settings"
        file: "src/data/settings.json"
        fields:
          - { label: "Under Construction Mode", name: "under_construction", widget: "boolean", default: false }

  - name: "gallery"
    label: "Gallery — Out of Office"
    delete: false
    editor:
      preview: false
    files:
      - name: "cities"
        label: "City Collections"
        file: "src/data/gallery.json"
        fields:
          - label: "Cities"
            name: "cities"
            widget: "list"
            collapsed: false
            fields:
              - { label: "City Name", name: "name", widget: "string", hint: "e.g. Chicago" }
              - { label: "URL Slug", name: "slug", widget: "string", hint: "e.g. chicago (lowercase, no spaces)" }
              - { label: "Tagline", name: "tagline", widget: "string", hint: "Short subtitle for the city" }
              - { label: "Cover Photo URL", name: "cover", widget: "image", hint: "Upload or paste URL for the city card cover image" }
              - label: "Photos"
                name: "photos"
                widget: "list"
                collapsed: true
                fields:
                  - { label: "Photo URL", name: "src", widget: "image", hint: "Upload or paste image URL" }
                  - { label: "Caption", name: "caption", widget: "string", hint: "Short description of the photo" }
