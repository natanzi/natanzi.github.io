backend:
  name: git-gateway
  branch: main

# ✏️ Editorial Workflow — Kanban board with Draft / In Review / Ready states
publish_mode: editorial_workflow

media_folder: "public/uploads"
public_folder: "/uploads"

media_library:
  name: cloudinary
  config:
    cloud_name: ddtuv5tpv
    api_key: "383232588839585"

collections:
  # ── Blog Posts ──────────────────────────────────────────────────────────────
  - name: "blog"
    label: "Blog Posts"
    folder: "src/content/blog"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Publish Date", name: "date", widget: "string" }
      - label: "Category"
        name: "category"
        widget: "select"
        options: ["Research", "Engineering", "AI & ML", "Career", "Opinion"]
      - { label: "Description", name: "description", widget: "text" }

      # 🏷️ Dynamic Tags
      - label: "Tags"
        name: "tags"
        widget: "list"
        allow_add: true
        required: false
        hint: "Add tags like: 5G/6G, O-RAN, Continual Learning, Python, ML..."
        field:
          label: "Tag"
          name: "tag"
          widget: "string"

      # 🔗 Relation — link related articles
      - label: "Related Articles"
        name: "related"
        widget: "relation"
        collection: "blog"
        search_fields: ["title", "description"]
        value_field: "{{slug}}"
        display_fields: ["title"]
        multiple: true
        required: false
        hint: "Link related posts — they will appear at the bottom of this article"

      # 🔍 SEO & Open Graph (collapsed by default)
      - label: "SEO & Social Share"
        name: "seo"
        widget: "object"
        collapsed: true
        required: false
        hint: "Customize how this post appears in Google and when shared on LinkedIn/Twitter"
        fields:
          - label: "Meta Title"
            name: "meta_title"
            widget: "string"
            required: false
            hint: "Leave blank to use the post title (max 60 chars)"
          - label: "Meta Description"
            name: "meta_description"
            widget: "text"
            required: false
            hint: "Short summary for Google search results (max 160 chars)"
          - label: "Social Share Image"
            name: "og_image"
            widget: "image"
            required: false
            hint: "Image shown when shared on LinkedIn/Twitter (1200×630px recommended)"

      - { label: "Body", name: "body", widget: "markdown" }

  # ── Experience & Career ──────────────────────────────────────────────────────
  - name: "experience"
    label: "Experience & Career"
    delete: false
    editor:
      preview: false
    files:
      - name: "work_history"
        label: "Work History"
        file: "src/data/experience.json"
        fields:
          - label: "Experience Entries"
            name: "experience"
            widget: "list"
            collapsed: false
            fields:
              - { label: "Job Title", name: "title", widget: "string", hint: "e.g. PhD Researcher" }
              - { label: "Company / Institution", name: "company", widget: "string", hint: "e.g. Worcester Polytechnic Institute (WPI)" }
              - { label: "Period", name: "period", widget: "string", hint: "e.g. 2023 — Present" }
              - label: "Type"
                name: "type"
                widget: "select"
                options:
                  - { label: "Academic / Research", value: "academic" }
                  - { label: "Industry / Corporate", value: "industry" }
              - { label: "Description", name: "description", widget: "text", hint: "What you did in this role" }

  # ── News & Updates ─────────────────────────────────────────────────────────────
  - name: "news"
    label: "News & Updates"
    delete: false
    editor:
      preview: false
    files:
      - name: "news_entries"
        label: "News Entries"
        file: "src/data/news.json"
        fields:
          - label: "News List"
            name: "news"
            widget: "list"
            collapsed: false
            fields:
              - { label: "Date", name: "date", widget: "string", hint: "e.g. Feb 2026" }
              - { label: "Content", name: "content", widget: "text", hint: "The news announcement" }
              - { label: "Link (Optional)", name: "link", widget: "string", required: false, hint: "URL to the paper, article, or announcement" }

  # ── Site Settings ────────────────────────────────────────────────────────────
  - name: "settings"
    label: "Site Settings"
    delete: false
    editor:
      preview: false
    files:
      - name: "general"
        label: "General Settings"
        file: "src/data/settings.json"
        fields:
          - { label: "Under Construction Mode", name: "under_construction", widget: "boolean", default: false }
          - label: "Homepage Layout"
            name: "layout"
            widget: "list"
            collapsed: false
            fields:
              - label: "Section"
                name: "section"
                widget: "select"
                options:
                  - { label: "News & Updates", value: "news" }
                  - { label: "Experience & Career", value: "experience" }
                  - { label: "Skills & Tools", value: "skills" }
                  - { label: "Selected Works (Projects)", value: "projects" }
                  - { label: "Articles & Thoughts (Blog)", value: "blog" }
              - { label: "Visible", name: "visible", widget: "boolean", default: true }

  # ── Gallery — Out of Office ──────────────────────────────────────────────────
  - name: "gallery"
    label: "Gallery — Out of Office"
    delete: false
    editor:
      preview: false
    files:
      - name: "cities"
        label: "City Collections"
        file: "src/data/gallery.json"
        fields:
          - label: "Cities"
            name: "cities"
            widget: "list"
            collapsed: false
            fields:
              - { label: "City Name", name: "name", widget: "string", hint: "e.g. Chicago" }
              - { label: "URL Slug", name: "slug", widget: "string", hint: "e.g. chicago (lowercase, no spaces)" }
              - { label: "Tagline", name: "tagline", widget: "string", hint: "Short subtitle for the city" }
              - { label: "Cover Photo", name: "cover", widget: "image", hint: "Upload via Cloudinary or paste URL" }
              - label: "Photos"
                name: "photos"
                widget: "list"
                collapsed: true
                fields:
                  - { label: "Photo", name: "src", widget: "image", hint: "Upload via Cloudinary" }
                  - { label: "Caption", name: "caption", widget: "string", hint: "Short description of the photo" }
                  # 📍 Location Metadata
                  - label: "Location"
                    name: "location"
                    widget: "string"
                    required: false
                    hint: "e.g. Michigan Ave & Wacker Dr, Chicago — appears as a subtle label on the photo"
